# 使用 MySQL 作为数据源
# 支持环境变量覆盖（用于云平台部署）
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/exam?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 数据库初始化配置
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:sql/init.sql
spring.sql.init.continue-on-error=true

# MyBatis 配置
mybatis.mapper-locations=classpath:mappers/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# 端口配置（支持环境变量）
server.port=${SERVER_PORT:8081}

# GCC编译器路径配置（支持环境变量）
# Windows示例: compiler.gcc.path=D:/mingw64/bin/gcc.exe
# Linux/Mac示例: compiler.gcc.path=gcc
compiler.gcc.path=${COMPILER_GCC_PATH:gcc}
