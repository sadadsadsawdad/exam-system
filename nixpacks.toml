[phases.setup]
nixPkgs = ["maven", "jdk17"]

[phases.install]
cmds = ["cd springboot && mvn dependency:go-offline"]

[phases.build]
cmds = ["cd springboot && mvn clean package -DskipTests"]

[start]
cmd = "java -Xms256m -Xmx512m -Dserver.port=$PORT -jar springboot/target/springboot-0.0.1-SNAPSHOT.jar"
